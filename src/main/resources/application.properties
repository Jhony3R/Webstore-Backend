spring.application.name=sigevi
server.port=8080
spring.jackson.time-zone=America/Lima
spring.jpa.properties.hibernate.jdbc.time_zone=America/Lima
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss


spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}


spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

logging.level.org.hibernate.tool.schema=ERROR

#Para que cargue el archivo sql despues de las tablas creadas0
spring.jpa.defer-datasource-initialization=true

#para que cargue el archivo sql
spring.sql.init.mode=never
#para indicarle el archivo sql
spring.sql.init.data-locations=classpath:data.sql

spring.datasource.hikari.max-lifetime=540000

spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# timeout para RestTemplate
spring.mvc.async.request-timeout=300000

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

